name: Setup mise
description: Install mise, the pinned toolchain, and project dependencies

runs:
  using: composite
  steps:
    - name: Install mise
      uses: jdx/mise-action@v4.2.0
      with:
        install: true
        cache: true

    - name: Cache uv dependencies
      uses: actions/cache@v6.1.0
      with:
        path: ~/.cache/uv
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: uv sync --all-groups
