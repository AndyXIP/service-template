name: core

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/mise-install
      - run: mise run check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/mise-install
      - run: mise run test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/mise-install
      - run: mise run build

      - name: Smoke test image
        run: |
          docker run -d --rm -p 8000:8000 --name smoke pixel-eat-api
          curl --fail --retry 5 --retry-delay 1 --retry-connrefused http://localhost:8000/utils/health
          docker stop smoke
