repos:
  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: uv run ruff check src/
        language: system
        pass_filenames: false
        always_run: true
      - id: type-check
        name: type check
        entry: uv run ty check src/
        language: system
        pass_filenames: false
        always_run: true
