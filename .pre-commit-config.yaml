repos:
  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        always_run: true
      - id: type-check
        name: type check
        entry: uv run ty check .
        language: system
        pass_filenames: false
        always_run: true
